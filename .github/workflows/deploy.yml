name: Production Deployment (CI/CD)

on:
  # Manual production deploy. This workflow requires GitHub secrets for Firebase
  # and Google Cloud; GitHub Pages handles automatic frontend deploys on push.
  workflow_dispatch:
    inputs:
      rollback_sha:
        description: 'Git SHA to deploy or roll back to (leave blank to use the latest commit)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: crowdsense-ai-prod
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  SERVICE: crowdsense-backend
  # Determine which commit SHA to deploy (current trigger SHA or requested rollback SHA)
  DEPLOY_SHA: ${{ github.event.inputs.rollback_sha || github.sha }}

jobs:
  # ==============================================================================
  # JOB 1: Test & Lint Code quality
  # ==============================================================================
  test:
    name: Run Quality Checks & Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend Checks
      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint Backend
        working-directory: ./backend
        run: npm run lint

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test

      # Frontend Checks
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint Frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test

  # ==============================================================================
  # JOB 2: Deploy Frontend to Firebase Hosting
  # ==============================================================================
  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies & Build
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          # Injected into the React bundle at build time
          VITE_API_BASE_URL: https://crowdsense-ai-owrl.onrender.com/api/v1
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ env.PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Deploy to Firebase Hosting
        run: npx -y firebase-tools@latest deploy --only hosting --project ${{ env.PROJECT_ID }}


