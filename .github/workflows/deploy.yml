name: Production Deployment (CI/CD)

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: crowdsense-ai-prod
  REGION: us-central1
  GAR_LOCATION: us-central1-docker.pkg.dev
  SERVICE: crowdsense-backend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Backend Tests
        working-directory: ./backend
        run: |
          npm ci
          npm test

      - name: Frontend Tests
        working-directory: ./frontend
        run: |
          npm ci
          npm test

  deploy-frontend:
    name: Deploy Frontend (Firebase Hosting)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & Build
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.PROD_API_URL }}
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}'
          projectId: crowdsense-ai-prod
          channelId: live

  deploy-backend:
    name: Deploy Backend (Cloud Run)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Docker Auth
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}

      - name: Build & Push Container
        working-directory: ./backend
        run: |
          docker build -t ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/repo/${{ env.SERVICE }}:${{ github.sha }} .
          docker push ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/repo/${{ env.SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}/${{ env.PROJECT_ID }}/repo/${{ env.SERVICE }}:${{ github.sha }}
          env_vars: |
            NODE_ENV=production
          secrets: |
            GEMINI_API_KEY=gemini-key:latest
            FIREBASE_PRIVATE_KEY=firebase-key:latest
