name: Keep Backend Alive

on:
  schedule:
    # Run every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend API
        run: |
          curl -sS https://crowdsense-ai-owrl.onrender.com/api/v1/map/status > /dev/null
          echo "Pinged backend successfully to prevent sleep."
